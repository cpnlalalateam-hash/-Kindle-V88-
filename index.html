<index.html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>小説エディタ 完全安定版</title>

<script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>

:root{
--accent:#27ae60;
--bg:#0d0d0d;
--pane:#161616;
--text:#e0e0e0;
}

body{
margin:0;
height:100vh;
display:flex;
background:var(--bg);
color:var(--text);
font-family:"MS Mincho","Hiragino Mincho ProN",serif;
overflow:hidden;
}

.pane{
height:100%;
display:flex;
flex-direction:column;
border-right:1px solid #333;
}

#editor{
width:35%;
background:var(--pane);
padding:20px;
overflow-y:auto;
}

#previewTate{width:35%;padding:20px}
#previewYoko{width:30%;padding:20px;border-right:none}

label{
margin-top:15px;
font-weight:bold;
color:var(--accent);
font-family:sans-serif;
font-size:0.85em;
}

input,textarea{
width:100%;
background:#222;
border:1px solid #444;
color:#fff;
padding:10px;
border-radius:6px;
box-sizing:border-box;
}

#main{
height:45vh;
line-height:1.8;
resize:none;
}

.phone{
background:white;
color:#333;
border:12px solid #222;
border-radius:40px;
height:80vh;
display:flex;
overflow:hidden;
}

.content{
padding:30px;
width:100%;
height:100%;
overflow:auto;
}

#tate{
writing-mode:vertical-rl;
line-height:2.2;
}

#yoko{
line-height:1.9;
}

.btn{
margin-top:20px;
background:var(--accent);
border:none;
color:white;
padding:20px;
font-size:18px;
border-radius:40px;
cursor:pointer;
}

.toc{
background:#222;
padding:10px;
border-left:4px solid var(--accent);
margin-bottom:10px;
font-size:13px;
}

.counter{
margin-top:8px;
font-size:12px;
color:#aaa;
}

.chapter{
color:var(--accent);
font-weight:bold;
font-size:1.2em;
margin:20px 0;
}

</style>
</head>

<body>

<div id="editor" class="pane">

<h2 style="color:var(--accent);margin:0">🏛️ 小説統合エディタ</h2>

<label>タイトル</label>
<input id="title" value="逆転のラスト・ダイヤモンド">

<label>あらすじ</label>
<textarea id="desc" style="height:80px">阿寒湖の氷の下に潜む、真実と偽物。</textarea>

<label>本文</label>

<div id="toc" class="toc">章を検出中...</div>

<textarea id="main" placeholder="ここに小説を書く"></textarea>

<div id="count" class="counter"></div>

<button class="btn" onclick="exportWord()">Word出力</button>

</div>


<div id="previewTate" class="pane">

<label style="text-align:center">縦書き</label>

<div class="phone">
<div id="tate" class="content"></div>
</div>

</div>


<div id="previewYoko" class="pane">

<label style="text-align:center">横書き</label>

<div class="phone">
<div id="yoko" class="content"></div>
</div>

</div>



<script>

const $=id=>document.getElementById(id)

const chapterRegex=/^(第[0-9一二三四五六七八九十百]+章|第[0-9]+話|序章|終章|プロローグ|エピローグ)(\s|　|:|：|$)/

let timer=null



function schedule(){

clearTimeout(timer)

timer=setTimeout(update,120)

}



$("main").addEventListener("input",schedule)
$("title").addEventListener("input",schedule)
$("desc").addEventListener("input",schedule)



function update(){

const title=$("title").value
const desc=$("desc").value
const text=$("main").value

localStorage.setItem("novel",text)

$("count").innerText="文字数 : "+text.length

const lines=text.split("\n")

let html=""
let chapters=[]

lines.forEach((line,i)=>{

if(chapterRegex.test(line)){

chapters.push({name:line,index:i})

html+=`<div class="chapter">${line}</div>`

}else{

html+=line+"<br>"

}

})

$("tate").innerHTML=`<h2>${title}</h2><p>${desc}</p><hr>`+html
$("yoko").innerHTML=`<h2>${title}</h2><p>${desc}</p><hr>`+html

if(chapters.length){

$("toc").innerHTML="目次 : "+chapters.map(c=>`<span style="cursor:pointer" onclick="jump(${c.index})">${c.name}</span>`).join(" / ")

}else{

$("toc").innerText="章タイトルなし"

}

}



function jump(line){

const text=$("main").value.split("\n")

let pos=0

for(let i=0;i<line;i++) pos+=text[i].length+1

$("main").focus()
$("main").setSelectionRange(pos,pos)

}



async function exportWord(){

const title=$("title").value
const desc=$("desc").value

const text=$("main").value
.replace(/([、。？！])\s+/g,"$1")
.replace(/\n{3,}/g,"\n\n")

const lines=text.split("\n")

let children=[]

children.push(new docx.Paragraph({
text:title,
heading:docx.HeadingLevel.TITLE,
alignment:docx.AlignmentType.CENTER
}))

children.push(new docx.Paragraph({
text:"著者",
alignment:docx.AlignmentType.CENTER
}))

children.push(new docx.Paragraph({text:""}))

children.push(new docx.Paragraph({
text:"あらすじ",
heading:docx.HeadingLevel.HEADING_1
}))

children.push(new docx.Paragraph({text:desc}))

children.push(new docx.Paragraph({text:"",pageBreakBefore:true}))

let first=true

lines.forEach(line=>{

if(chapterRegex.test(line)){

children.push(new docx.Paragraph({
text:line,
heading:docx.HeadingLevel.HEADING_1,
pageBreakBefore:!first
}))

first=false

}else{

children.push(new docx.Paragraph({
text:line||" ",
spacing:{line:360}
}))

}

})

const doc=new docx.Document({
sections:[{children}]
})

const blob=await docx.Packer.toBlob(doc)

saveAs(blob,title+".docx")

}



function load(){

const saved=localStorage.getItem("novel")

if(saved) $("main").value=saved

update()

}



load()

</script>

</body>
</html>
